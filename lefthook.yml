pre-commit:
  commands:
    check:
      glob: '*.{js,ts,tsx,json}'
      run: pnpm vp check --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    ls-lint:
      run: pnpm run ls-lint

pre-push:
  commands:
    check:
      glob: '*.{js,ts,tsx,json}'
      run: pnpm vp check --no-error-on-unmatched-pattern {staged_files}
