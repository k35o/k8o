name: Pavo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  pavo:
    # /pavo コマンド以外の通常コメントで runner を起こさないための事前フィルタ。
    # コメント・返信起点の実行は reusable workflow 側の gate が
    # author_association (OWNER/MEMBER/COLLABORATOR) で制限する。
    if: ${{ github.event_name != 'issue_comment' || startsWith(github.event.comment.body, '/pavo') }}
    uses: k35o/pavo/.github/workflows/review.yml@main
    with:
      instructions: default,nextjs,typescript
      extra_prompt: |
        Next.js App Router + oxlint のモノレポです。
        apps/main / apps/admin の 2 アプリ + packages/ 配下の共有パッケージで構成。
    secrets: inherit
