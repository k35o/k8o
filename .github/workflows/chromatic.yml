name: 'Chromatic'

on: push

permissions:
  contents: read

jobs:
  chromatic-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup
        uses: ./.github/actions/setup
      - name: Publish Main to Chromatic
        uses: chromaui/action@7804f34e4e59c0d9b3c856848f46ad96d7897429 # v17.5.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          skip: 'renovate/**'
          workingDir: apps/main
      - name: Publish Admin to Chromatic
        uses: chromaui/action@7804f34e4e59c0d9b3c856848f46ad96d7897429 # v17.5.0
        with:
          projectToken: ${{ secrets.CHROMATIC_ADMIN_PROJECT_TOKEN }}
          onlyChanged: true
          skip: 'renovate/**'
          workingDir: apps/admin
