name: Renovate

on:
  schedule:
    - cron: '0 15,18,21 * * 5'
    - cron: '0 0 * * 6'
  issues:
    types: [edited]
  pull_request_target:
    types: [edited, closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.title, 'Dependency Dashboard') && github.event.sender.login == github.repository_owner) ||
      (github.event_name == 'pull_request_target' && github.event.sender.login == github.repository_owner && contains(github.event.pull_request.labels.*.name, 'renovate'))
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.K35O_BOT_APP_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Run Renovate
        uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        with:
          token: ${{ steps.generate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
