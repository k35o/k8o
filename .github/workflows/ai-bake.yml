name: AI Sandbox Bake

# sandbox-template を変更した PR で snapshot が古ければ、CI が焼き直して
# template-snapshot.ts（snapshotId + 内容ハッシュ）を k8o-bot がコミットする。
# これで「テンプレ更新のたびに手動 bake」が不要になる。
on:
  pull_request:
    paths:
      - 'apps/ai/sandbox-template/**'

# renovate の force-push などで同一ブランチに再bakeが多重起動しないよう直列化する（最新のみ実行）。
concurrency:
  group: ai-bake-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bake:
    # fork PR は secrets（bot/VERCEL トークン）を取得できないため除外する。
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Generate k8o-bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      # テンプレ内容ハッシュが template-snapshot.ts と一致するか（= 再 bake が要るか）を判定する。
      # bot のコミットで再発火しても、ここで stale=false になり Sandbox を起こさず終了する（課金もループも防ぐ）。
      - name: Check snapshot drift
        id: drift
        run: |
          if pnpm -F @repo/ai exec vitest run --project="features test" src/features/preview/infrastructure/template-snapshot.test.ts; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-bake snapshot
        if: steps.drift.outputs.stale == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node apps/ai/scripts/bake-sandbox-snapshot.mjs

      - name: Commit updated snapshot
        if: steps.drift.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          POINTER: apps/ai/src/features/preview/infrastructure/template-snapshot.ts
        run: |
          if git diff --quiet -- "$POINTER"; then
            echo "snapshot は最新（差分なし）。コミットしません。"
            exit 0
          fi
          # GitHub API(createCommitOnBranch)経由でコミットすると App 署名が付き verified になる。
          # ローカル git commit だと unsigned になり、Vercel の verified-commits 制約でデプロイが CANCELED される。
          head_oid=$(git rev-parse HEAD)
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg oid "$head_oid" \
            --arg path "$POINTER" \
            --arg contents "$(base64 -w0 "$POINTER")" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: "chore(ai): re-bake sandbox snapshot" },
                  expectedHeadOid: $oid,
                  fileChanges: { additions: [{ path: $path, contents: $contents }] }
                }
              }
            }' | gh api graphql --input -
