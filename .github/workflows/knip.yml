name: Knip Report

on:
  schedule:
    # 毎週月曜 9:00 JST (UTC 0:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run knip report
        uses: k35o/patrol-board@8d514149157cc5f38eb53b66cb19061f7422ffd6 # v0.0.3
        with:
          script: './.github/scripts/knip-report.sh'
          issue-title: 'Knip 定期レポート'
          issue-label: 'knip-report'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
