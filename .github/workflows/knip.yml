name: Knip Report

on:
  schedule:
    # 毎週月曜 9:00 JST (UTC 0:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Run knip
        id: knip
        run: |
          output=$(pnpm run knip 2>&1) || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update or create issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const label = 'knip-report';
            const title = 'Knip 定期レポート';
            const output = `${{ steps.knip.outputs.output }}`;
            const date = new Date().toLocaleDateString('ja-JP', {
              timeZone: 'Asia/Tokyo',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            });
            const body = `## ${date} のKnipレポート\n\n\`\`\`\n${output || '問題なし'}\n\`\`\`\n\n[ワークフロー実行](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            // ラベルが存在しない場合は作成
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'e4e669',
                description: 'Knip による未使用コード・依存関係のレポート',
              });
            }

            // 既存のIssueを検索
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.data.length > 0) {
              // 既存Issueにコメントを追加
              const issue = issues.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              console.log(`Issue #${issue.number} にコメントを追加しました`);
            } else {
              // 新規Issueを作成
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              console.log(`Issue #${newIssue.data.number} を作成しました`);
            }
