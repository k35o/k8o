name: Knip Report

on:
  schedule:
    # 毎週月曜 9:00 JST (UTC 0:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run knip report
        uses: k35o/patrol-board@a10b04e920ed2cb25b8bde9569a82994f6f4d681 # v0
        with:
          script: './.github/scripts/knip-report.sh'
          issue-title: 'Knip 定期レポート'
          issue-label: 'knip-report'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
