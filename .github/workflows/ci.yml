name: ci

on: push

# 同一ブランチへの連続pushでは古い実行をキャンセルする（mainは全コミットの結果を残す）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Run ls-lint
        run: pnpm run ls-lint

      # oxlint の type-aware ルール(typescript/no-unnecessary-type-assertion 等)は
      # Next.js が生成する Route 型に依存する。check は type-check より先に走るため、
      # 先に各アプリの型を生成しておかないと Route を string とみなし `as Route` を
      # 不要と誤検出する。
      - name: Generate Next.js route types
        run: pnpm --filter "./apps/*" exec next typegen

      - name: Run check
        run: pnpm run check

      - name: Run type check
        run: pnpm run type-check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install Playwright
        run: pnpm run install-playwright

      - name: Run test
        run: pnpm run test
