name: Setup
description: Setup mise and install dependencies

runs:
  using: 'composite'
  steps:
    - name: Setup mise
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      with:
        cache: true

    - name: Install dependencies
      run: pnpm ci
      shell: bash
