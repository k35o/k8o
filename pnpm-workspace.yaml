packages:
  - apps/*
  - packages/*

allowBuilds:
  '@prisma/engines': false
  '@swc/core': false
  esbuild: false
  msgpackr-extract: false
  msw: true
  sharp: false
  # wranglerの依存。pages deployはAPIアップロードのみでworkerd実行は不要
  workerd: false

blockExoticSubdeps: true

catalog:
  '@k8o/arte-odyssey': 10.5.0
  '@next/env': 16.2.9
  '@next/mdx': 16.2.9
  '@next/third-parties': 16.2.9
  '@storybook/addon-a11y': 10.4.6
  '@storybook/addon-docs': 10.4.6
  '@storybook/addon-mcp': '0.6.0'
  '@storybook/addon-vitest': 10.4.6
  '@storybook/nextjs-vite': 10.4.6
  '@tailwindcss/postcss': 4.3.0
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitest/browser-playwright': 4.1.9
  '@vitest/coverage-v8': 4.1.9
  '@vitest/ui': 4.1.9
  babel-plugin-react-compiler: 1.0.0
  better-auth: 1.6.14
  chromatic: 17.3.0
  drizzle-orm: 0.45.2
  next: 16.2.9
  next-themes: 0.4.6
  postcss: 8.5.15
  postcss-load-config: 6.0.1
  react: 19.2.7
  react-dom: 19.2.7
  storybook: 10.4.6
  storybook-addon-determinism: 0.1.1
  storybook-addon-vrt: 0.1.0
  tailwindcss: 4.3.0
  vitest: 4.1.9
  wrangler: 4.98.0

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@k8o/*'
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
  - storybook-addon-vrt
  - storybook-addon-mock-date
  - storybook-addon-determinism
  - vite-plus-inspector

verifyDepsBeforeRun: install

overrides:
  vite-plugin-storybook-nextjs: 3.3.0
