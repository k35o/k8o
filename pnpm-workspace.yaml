  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitest/browser-playwright': 4.1.10
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
  ai: 7.0.22
